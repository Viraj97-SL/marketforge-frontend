    M 1040,92
    C 1052,82 1068,84 1080,92
    C 1094,102 1106,118 1112,136
    C 1118,154 1122,174 1120,194
    C 1118,212 1124,230 1122,250
    C 1120,268 1114,286 1118,306
    C 1122,326 1118,346 1110,362
    C 1102,378 1104,396 1094,412
    C 1084,428 1070,440 1054,444
    C 1038,448 1022,444 1008,434
    C 994,424 982,410 976,394
    C 970,378 970,362 974,346
    C 978,330 972,312 970,294
    C 968,276 972,258 968,240
    C 964,222 968,204 972,186
    C 976,168 986,152 982,134
    C 978,116 982,98  994,86
