<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" fill="none">
  <defs>
    <!-- Radial glow at composition center -->
    <radialGradient id="centreGlow" cx="72%" cy="52%" r="40%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- City dot glow -->
    <filter id="cityGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="londonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Data stream gradient (left-flowing) -->
    <linearGradient id="streamL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="streamR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Atmospheric glow behind UK ── -->
  <ellipse cx="1040" cy="400" rx="380" ry="360" fill="url(#centreGlow)"/>

  <!-- ── Orbital / orbit rings ── -->
  <ellipse cx="1040" cy="400" rx="340" ry="320" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <ellipse cx="1040" cy="400" rx="280" ry="260" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <ellipse cx="1040" cy="400" rx="220" ry="200" stroke="white" stroke-opacity="0.07" stroke-width="0.8"/>

  <!-- Dashed accent ring -->
  <ellipse cx="1040" cy="400" rx="340" ry="320" stroke="white" stroke-opacity="0.12"
    stroke-width="1.5" stroke-dasharray="8 16"/>

  <!-- ── Grid lines (subtle, angled) ── -->
  <line x1="400" y1="0"   x2="400" y2="800" stroke="white" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="700" y1="0"   x2="700" y2="800" stroke="white" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="1000" y1="0"  x2="1000" y2="800" stroke="white" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="1300" y1="0"  x2="1300" y2="800" stroke="white" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0"   y1="200" x2="1440" y2="200" stroke="white" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0"   y1="400" x2="1440" y2="400" stroke="white" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0"   y1="600" x2="1440" y2="600" stroke="white" stroke-opacity="0.025" stroke-width="1"/>

