<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <!-- Dense neural network — many nodes -->
  <!-- Layer 1 (input) -->
  <circle cx="80"  cy="80"  r="10" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="80"  cy="140" r="10" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="80"  cy="200" r="10" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="80"  cy="260" r="10" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="80"  cy="320" r="10" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="80"  cy="380" r="10" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Layer 2 -->
  <circle cx="200" cy="60"  r="12" fill="white" fill-opacity="0.28" stroke="white" stroke-opacity="0.45" stroke-width="1.2"/>
  <circle cx="200" cy="130" r="12" fill="white" fill-opacity="0.28" stroke="white" stroke-opacity="0.45" stroke-width="1.2"/>
  <circle cx="200" cy="200" r="12" fill="white" fill-opacity="0.28" stroke="white" stroke-opacity="0.45" stroke-width="1.2"/>
  <circle cx="200" cy="270" r="12" fill="white" fill-opacity="0.28" stroke="white" stroke-opacity="0.45" stroke-width="1.2"/>
  <circle cx="200" cy="340" r="12" fill="white" fill-opacity="0.28" stroke="white" stroke-opacity="0.45" stroke-width="1.2"/>

  <!-- Layer 3 (hidden) — larger -->
  <circle cx="340" cy="80"  r="15" fill="white" fill-opacity="0.35" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="340" cy="170" r="15" fill="white" fill-opacity="0.35" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="340" cy="260" r="15" fill="white" fill-opacity="0.35" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="340" cy="350" r="15" fill="white" fill-opacity="0.35" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- Layer 4 (attention) — highlighted -->
  <circle cx="480" cy="110" r="18" fill="white" fill-opacity="0.45" stroke="white" stroke-opacity="0.65" stroke-width="2"/>
  <circle cx="480" cy="210" r="18" fill="white" fill-opacity="0.55" stroke="white" stroke-opacity="0.75" stroke-width="2"/>
  <circle cx="480" cy="310" r="18" fill="white" fill-opacity="0.45" stroke="white" stroke-opacity="0.65" stroke-width="2"/>
  <!-- Glow ring on central node -->
  <circle cx="480" cy="210" r="30" fill="white" fill-opacity="0.06"/>
  <circle cx="480" cy="210" r="42" fill="white" fill-opacity="0.03"/>

  <!-- Layer 5 -->
  <circle cx="620" cy="130" r="14" fill="white" fill-opacity="0.35" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="620" cy="210" r="14" fill="white" fill-opacity="0.4"  stroke="white" stroke-opacity="0.55" stroke-width="1.5"/>
  <circle cx="620" cy="290" r="14" fill="white" fill-opacity="0.35" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- Layer 6 (output) -->
  <circle cx="740" cy="160" r="16" fill="white" fill-opacity="0.5"  stroke="white" stroke-opacity="0.7" stroke-width="2"/>
  <circle cx="740" cy="260" r="16" fill="white" fill-opacity="0.5"  stroke="white" stroke-opacity="0.7" stroke-width="2"/>

  <!-- Output node -->
  <circle cx="860" cy="210" r="20" fill="white" fill-opacity="0.65" stroke="white" stroke-opacity="0.85" stroke-width="2.5"/>

  <!-- Connections — layer 1 to 2 (selected) -->
  <line x1="90" y1="80"  x2="188" y2="60"  stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="80"  x2="188" y2="130" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="140" x2="188" y2="60"  stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="140" x2="188" y2="130" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="140" x2="188" y2="200" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="200" x2="188" y2="130" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="200" x2="188" y2="200" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="200" x2="188" y2="270" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="260" x2="188" y2="200" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="260" x2="188" y2="270" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="260" x2="188" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="320" x2="188" y2="270" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="320" x2="188" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
  <line x1="90" y1="380" x2="188" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>

  <!-- Layer 2 to 3 -->
  <line x1="212" y1="60"  x2="325" y2="80"  stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="60"  x2="325" y2="170" stroke="white" stroke-opacity="0.08" stroke-width="0.8"/>
  <line x1="212" y1="130" x2="325" y2="80"  stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="130" x2="325" y2="170" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="200" x2="325" y2="170" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="200" x2="325" y2="260" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="270" x2="325" y2="260" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="270" x2="325" y2="350" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="340" x2="325" y2="260" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="212" y1="340" x2="325" y2="350" stroke="white" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Layer 3 to 4 — highlighted paths -->
  <line x1="355" y1="80"  x2="462" y2="110" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="355" y1="170" x2="462" y2="110" stroke="white" stroke-opacity="0.2"  stroke-width="1.2"/>
  <line x1="355" y1="170" x2="462" y2="210" stroke="white" stroke-opacity="0.35" stroke-width="2"/>
  <line x1="355" y1="260" x2="462" y2="210" stroke="white" stroke-opacity="0.35" stroke-width="2"/>
  <line x1="355" y1="260" x2="462" y2="310" stroke="white" stroke-opacity="0.2"  stroke-width="1.2"/>
  <line x1="355" y1="350" x2="462" y2="310" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Layer 4 to 5 -->
  <line x1="498" y1="110" x2="606" y2="130" stroke="white" stroke-opacity="0.3"  stroke-width="1.5"/>
  <line x1="498" y1="210" x2="606" y2="130" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="498" y1="210" x2="606" y2="210" stroke="white" stroke-opacity="0.4"  stroke-width="2"/>
  <line x1="498" y1="210" x2="606" y2="290" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="498" y1="310" x2="606" y2="210" stroke="white" stroke-opacity="0.2"  stroke-width="1.2"/>
  <line x1="498" y1="310" x2="606" y2="290" stroke="white" stroke-opacity="0.3"  stroke-width="1.5"/>

  <!-- Layer 5 to 6 -->
  <line x1="634" y1="130" x2="724" y2="160" stroke="white" stroke-opacity="0.35" stroke-width="2"/>
  <line x1="634" y1="210" x2="724" y2="160" stroke="white" stroke-opacity="0.3"  stroke-width="1.5"/>
  <line x1="634" y1="210" x2="724" y2="260" stroke="white" stroke-opacity="0.3"  stroke-width="1.5"/>
  <line x1="634" y1="290" x2="724" y2="260" stroke="white" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Layer 6 to output -->
  <line x1="756" y1="160" x2="840" y2="210" stroke="white" stroke-opacity="0.5" stroke-width="2.5"/>
  <line x1="756" y1="260" x2="840" y2="210" stroke="white" stroke-opacity="0.5" stroke-width="2.5"/>

  <!-- Research paper silhouette -->
  <rect x="490" y="310" width="130" height="90" rx="8" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="500" y="322" width="80"  height="7"  rx="3" fill="white" fill-opacity="0.25"/>
  <rect x="500" y="335" width="110" height="5"  rx="2" fill="white" fill-opacity="0.15"/>
  <rect x="500" y="345" width="100" height="5"  rx="2" fill="white" fill-opacity="0.12"/>
  <rect x="500" y="355" width="60"  height="5"  rx="2" fill="white" fill-opacity="0.12"/>
  <rect x="500" y="370" width="110" height="4"  rx="2" fill="white" fill-opacity="0.1"/>
  <rect x="500" y="380" width="90"  height="4"  rx="2" fill="white" fill-opacity="0.1"/>

  <!-- arXiv label chip -->
  <rect x="499" y="388" width="50" height="14" rx="7" fill="white" fill-opacity="0.12"/>
  <text x="524" y="399" text-anchor="middle" font-family="monospace" font-size="7" fill="white" fill-opacity="0.6">arXiv</text>

  <!-- Layer labels -->
  <text x="80"  y="408" text-anchor="middle" font-family="system-ui" font-size="8" fill="white" fill-opacity="0.25">Input</text>
  <text x="480" y="24"  text-anchor="middle" font-family="system-ui" font-size="8" fill="white" fill-opacity="0.3">Attention</text>
  <text x="860" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="white" fill-opacity="0.3">Signal</text>
</svg>
