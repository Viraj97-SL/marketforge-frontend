  <circle cx="540" cy="300" r="15" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="540" y="305" text-anchor="middle" font-family="system-ui" font-size="8" fill="white" fill-opacity="0.55">SQL</text>

  <circle cx="860" cy="200" r="14" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="860" y="205" text-anchor="middle" font-family="system-ui" font-size="7.5" fill="white" fill-opacity="0.5">RAG</text>

