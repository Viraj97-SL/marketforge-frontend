  <line x1="648" y1="190" x2="582" y2="138" stroke="white" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="712" y1="190" x2="780" y2="138" stroke="white" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="710" y1="234" x2="803" y2="268" stroke="white" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="656" y1="234" x2="618" y2="304" stroke="white" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="660" y1="228" x2="555" y2="290" stroke="white" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="718" y1="218" x2="846" y2="206" stroke="white" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="710" y1="244" x2="749" y2="346" stroke="white" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- Skill rank pills floating -->
  <rect x="460" y="50" width="120" height="28" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="472" y="60" width="30"  height="8"  rx="4" fill="white" fill-opacity="0.4"/>
  <rect x="510" y="60" width="55"  height="8"  rx="4" fill="white" fill-opacity="0.25"/>

  <rect x="460" y="90" width="120" height="28" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="472" y="100" width="30"  height="8"  rx="4" fill="white" fill-opacity="0.35"/>
  <rect x="510" y="100" width="55"  height="8"  rx="4" fill="white" fill-opacity="0.22"/>

  <rect x="460" y="130" width="120" height="28" rx="14" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="472" y="140" width="30"  height="8"  rx="4" fill="white" fill-opacity="0.3"/>
  <rect x="510" y="140" width="55"  height="8"  rx="4" fill="white" fill-opacity="0.18"/>

  <!-- Upward trend arrow (top right) -->
  <polyline points="500,380 540,340 580,350 620,300 660,280 700,230 720,190"
    stroke="white" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
