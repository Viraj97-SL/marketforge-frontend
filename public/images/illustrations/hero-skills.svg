  <circle cx="680" cy="210" r="36" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.4" stroke-width="2"/>
  <circle cx="680" cy="210" r="28" fill="white" fill-opacity="0.1"/>
