<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <!-- Grid lines -->
  <line x1="0" y1="80"  x2="900" y2="80"  stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="320" x2="900" y2="320" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Dashboard frame -->
  <rect x="480" y="20" width="400" height="280" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Dashboard header bar -->
  <rect x="480" y="20" width="400" height="40" rx="16" fill="white" fill-opacity="0.07"/>
  <circle cx="502" cy="40" r="5" fill="white" fill-opacity="0.35"/>
  <circle cx="520" cy="40" r="5" fill="white" fill-opacity="0.25"/>
  <circle cx="538" cy="40" r="5" fill="white" fill-opacity="0.18"/>
  <rect x="560" y="33" width="120" height="14" rx="7" fill="white" fill-opacity="0.1"/>

  <!-- Bar chart inside dashboard -->
  <rect x="510" y="190" width="32" height="80"  rx="4" fill="white" fill-opacity="0.45"/>
  <rect x="554" y="150" width="32" height="120" rx="4" fill="white" fill-opacity="0.55"/>
  <rect x="598" y="120" width="32" height="150" rx="4" fill="white" fill-opacity="0.65"/>
  <rect x="642" y="100" width="32" height="170" rx="4" fill="white" fill-opacity="0.75"/>
  <rect x="686" y="80"  width="32" height="190" rx="4" fill="white" fill-opacity="0.85"/>
  <rect x="730" y="65"  width="32" height="205" rx="4" fill="white" fill-opacity="0.95"/>
  <rect x="774" y="55"  width="32" height="215" rx="4" fill="white" fill-opacity="1"/>

  <!-- Trend line over bars -->
  <polyline points="526,210 570,170 614,140 658,118 702,96 746,82 790,72"
    stroke="white" stroke-opacity="0.9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="526" cy="210" r="4" fill="white" fill-opacity="0.8"/>
  <circle cx="790" cy="72"  r="6" fill="white" fill-opacity="1"/>

  <!-- KPI stat cards -->
  <rect x="500" y="78" width="100" height="46" rx="8" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="504" y="86" width="40" height="8" rx="4" fill="white" fill-opacity="0.25"/>
  <rect x="504" y="100" width="60" height="14" rx="4" fill="white" fill-opacity="0.5"/>

  <rect x="614" y="78" width="100" height="46" rx="8" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="618" y="86" width="40" height="8" rx="4" fill="white" fill-opacity="0.25"/>
  <rect x="618" y="100" width="60" height="14" rx="4" fill="white" fill-opacity="0.5"/>

  <!-- UK Map outline (simplified, right side) -->
  <path d="M190,60 C198,54 210,56 220,62 C230,68 240,80 244,96 C248,112 254,128 252,144
           C250,160 256,174 258,190 C260,206 258,222 254,236 C250,250 254,264 250,278
           C246,292 240,304 232,314 C224,324 214,330 202,328 C190,326 180,318 172,308
           C164,298 158,286 156,272 C154,258 156,244 154,230 C152,216 156,202 158,188
           C160,174 156,160 158,146 C160,132 168,120 164,106 C160,92 164,78 172,68 Z"
    fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- City dots on map -->
  <circle cx="210" cy="270" r="12" fill="white" fill-opacity="0.7"/>
  <circle cx="210" cy="270" r="20" fill="white" fill-opacity="0.08"/>
  <circle cx="190" cy="185" r="6"  fill="white" fill-opacity="0.55"/>
  <circle cx="200" cy="140" r="5"  fill="white" fill-opacity="0.45"/>
  <circle cx="176" cy="130" r="4"  fill="white" fill-opacity="0.4"/>
  <circle cx="223" cy="240" r="5"  fill="white" fill-opacity="0.5"/>
  <circle cx="205" cy="220" r="5"  fill="white" fill-opacity="0.45"/>

  <!-- Connection lines from London -->
  <line x1="210" y1="270" x2="190" y2="185" stroke="white" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="210" y1="270" x2="200" y2="140" stroke="white" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="210" y1="270" x2="223" y2="240" stroke="white" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- Hiring velocity line chart (bottom left) -->
  <rect x="30" y="290" width="340" height="100" rx="12" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <polyline points="50,360 95,340 140,350 185,320 230,305 275,310 320,290 350,285"
    stroke="white" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="50,375 95,368 140,372 185,360 230,355 275,358 320,345 350,340"
    stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"
    stroke-dasharray="5 4"/>

  <!-- Floating stat pill -->
  <rect x="30" y="220" width="130" height="44" rx="22" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="52" cy="242" r="6" fill="white" fill-opacity="0.6"/>
  <rect x="64" y="234" width="50" height="8"  rx="4" fill="white" fill-opacity="0.5"/>
  <rect x="64" y="246" width="70" height="6"  rx="3" fill="white" fill-opacity="0.3"/>

  <!-- Floating salary chip -->
  <rect x="310" y="180" width="140" height="44" rx="22" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="330" y="192" width="60" height="8"  rx="4" fill="white" fill-opacity="0.5"/>
  <rect x="330" y="204" width="90" height="6"  rx="3" fill="white" fill-opacity="0.3"/>

  <!-- Scatter dots -->
  <circle cx="60"  cy="130" r="3" fill="white" fill-opacity="0.3"/>
  <circle cx="100" cy="90"  r="4" fill="white" fill-opacity="0.25"/>
  <circle cx="140" cy="110" r="3" fill="white" fill-opacity="0.2"/>
  <circle cx="80"  cy="60"  r="2" fill="white" fill-opacity="0.2"/>
  <circle cx="350" cy="60"  r="3" fill="white" fill-opacity="0.2"/>
  <circle cx="380" cy="100" r="2" fill="white" fill-opacity="0.15"/>
  <circle cx="420" cy="80"  r="3" fill="white" fill-opacity="0.2"/>
  <circle cx="440" cy="140" r="2" fill="white" fill-opacity="0.15"/>
</svg>
